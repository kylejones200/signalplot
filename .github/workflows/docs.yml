name: Docs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

# Run official JavaScript actions on Node 24 (GitHub is deprecating Node 20 on runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[docs,dev]"

      - name: Run tests
        run: |
          python -m pytest

      - name: Format and lint (ruff)
        run: |
          python -m ruff format --check signalplot tests scripts
          python -m ruff check signalplot tests scripts

      - name: Typecheck (mypy)
        run: |
          python -m mypy

      - name: Regenerate gallery PNGs
        run: |
          python scripts/regen_gallery.py

      - name: Build HTML docs
        run: |
          sphinx-build -b html docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


